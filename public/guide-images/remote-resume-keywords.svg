<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Remote resume keyword workflow</title>
  <desc id="desc">A diagram showing remote job posting terms becoming truthful resume evidence and checker review.</desc>
  <rect width="1200" height="630" fill="#f8fafc"/>
  <rect x="56" y="54" width="1088" height="522" rx="28" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="96" y="120" fill="#0f172a" font-family="Arial, sans-serif" font-size="44" font-weight="700">Remote Resume Keywords</text>
  <text x="96" y="158" fill="#475569" font-family="Arial, sans-serif" font-size="20">Turn job-posting language into honest evidence, not keyword stuffing.</text>
  <g fill="#eef2ff" stroke="#c7d2fe" stroke-width="2">
    <rect x="96" y="218" width="270" height="244" rx="20"/>
    <rect x="466" y="218" width="270" height="244" rx="20"/>
    <rect x="836" y="218" width="270" height="244" rx="20"/>
  </g>
  <g font-family="Arial, sans-serif">
    <text x="126" y="270" fill="#3730a3" font-size="22" font-weight="700">Job post terms</text>
    <text x="126" y="320" fill="#0f172a" font-size="24">async updates</text>
    <text x="126" y="358" fill="#0f172a" font-size="24">documentation</text>
    <text x="126" y="396" fill="#0f172a" font-size="24">distributed team</text>
    <text x="496" y="270" fill="#3730a3" font-size="22" font-weight="700">Resume evidence</text>
    <text x="496" y="320" fill="#0f172a" font-size="22">weekly handoff notes</text>
    <text x="496" y="358" fill="#0f172a" font-size="22">Jira ticket ownership</text>
    <text x="496" y="396" fill="#0f172a" font-size="22">Slack client updates</text>
    <text x="866" y="270" fill="#3730a3" font-size="22" font-weight="700">ApplyReadyCV review</text>
    <text x="866" y="320" fill="#0f172a" font-size="22">matched keywords</text>
    <text x="866" y="358" fill="#0f172a" font-size="22">missing signals</text>
    <text x="866" y="396" fill="#0f172a" font-size="22">remote-fit fixes</text>
  </g>
  <g stroke="#4f46e5" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M382 340h62"/>
    <path d="M430 320l24 20-24 20"/>
    <path d="M752 340h62"/>
    <path d="M800 320l24 20-24 20"/>
  </g>
  <rect x="96" y="500" width="1010" height="38" rx="19" fill="#ecfdf5"/>
  <text x="126" y="526" fill="#047857" font-family="Arial, sans-serif" font-size="18" font-weight="700">Best practice: add remote keywords only when you can support them with real work examples.</text>
</svg>
