<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">No experience CV proof map</title>
  <desc id="desc">A diagram showing how school, projects, volunteer work, training, and part-time work can support a no-experience CV.</desc>
  <rect width="1200" height="630" fill="#f8fafc"/>
  <rect x="58" y="54" width="1084" height="522" rx="28" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="96" y="118" fill="#0f172a" font-family="Arial, sans-serif" font-size="42" font-weight="700">No-Experience CV Guide</text>
  <text x="96" y="156" fill="#475569" font-family="Arial, sans-serif" font-size="20">Use real proof from education, projects, training, and responsibility.</text>
  <circle cx="600" cy="338" r="86" fill="#eef2ff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="552" y="328" fill="#3730a3" font-family="Arial, sans-serif" font-size="24" font-weight="700">Role-fit</text>
  <text x="558" y="362" fill="#3730a3" font-family="Arial, sans-serif" font-size="24" font-weight="700">proof</text>
  <g fill="#ffffff" stroke="#cbd5e1" stroke-width="2" font-family="Arial, sans-serif">
    <rect x="110" y="230" width="260" height="84" rx="18"/>
    <rect x="110" y="382" width="260" height="84" rx="18"/>
    <rect x="830" y="230" width="260" height="84" rx="18"/>
    <rect x="830" y="382" width="260" height="84" rx="18"/>
    <rect x="468" y="470" width="264" height="70" rx="18"/>
  </g>
  <g fill="#0f172a" font-family="Arial, sans-serif" font-size="22" font-weight="700">
    <text x="148" y="282">School projects</text>
    <text x="152" y="434">Internships</text>
    <text x="878" y="282">Volunteer work</text>
    <text x="878" y="434">Certifications</text>
    <text x="510" y="515">Part-time work</text>
  </g>
  <g stroke="#4f46e5" stroke-width="6" stroke-linecap="round" fill="none">
    <path d="M372 274c62 8 112 30 154 68"/>
    <path d="M372 424c62-10 112-35 154-72"/>
    <path d="M828 274c-62 8-112 30-154 68"/>
    <path d="M828 424c-62-10-112-35-154-72"/>
    <path d="M600 468v-42"/>
  </g>
  <rect x="96" y="548" width="1008" height="28" rx="14" fill="#ecfdf5"/>
  <text x="126" y="568" fill="#047857" font-family="Arial, sans-serif" font-size="17" font-weight="700">No experience does not mean no evidence. The job is to make honest evidence easy to find.</text>
</svg>
